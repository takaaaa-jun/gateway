location /recipe_chatbot_app/ {
    set $upstream http://recipe_chatbot_app:80;
    rewrite ^/recipe_chatbot_app/(.*)$ /$1 break;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /recipe_chatbot_app {
    return 301 /recipe_chatbot_app/;
}

# Automatically redirect UI top-level routes to the /recipe_chatbot_app/ subpath
location ~ ^/(datasets|apps|explore|tools|app)(/.*)?$ {
    return 301 /recipe_chatbot_app$request_uri;
}

# Dify (recipe_chatbot_app) uses strict root paths for its UI and APIs by default.
# As the other apps rely on specific subpaths and have no conflicts with Dify's top-level namespaces,
# we route these core Dify paths to the recipe_chatbot_app backend so its UI loads flawlessly via Gateway.
location ~ ^/(console|api|v1|files|e|mcp|triggers|_next|assets|logo|favicon\.ico|manifest\.json|robots\.txt|apple-touch-icon.*)(/.*)?$ {
    set $upstream_dify http://recipe_chatbot_app:80;
    proxy_pass $upstream_dify;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
